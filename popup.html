<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 280px;
    padding: 16px;
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 14px;
    color: #1a1a1a;
    background: #fff;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .header img { width: 28px; height: 28px; }

  .header h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-top: 1px solid #e5e5e5;
  }

  .status { font-size: 13px; color: #666; }
  .status.on { color: #16a34a; }

  .switch {
    position: relative;
    width: 44px;
    height: 24px;
    flex-shrink: 0;
  }

  .switch input { opacity: 0; width: 0; height: 0; }

  .slider {
    position: absolute;
    inset: 0;
    background: #ccc;
    border-radius: 24px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .slider::before {
    content: '';
    position: absolute;
    width: 18px;
    height: 18px;
    left: 3px;
    bottom: 3px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.2s;
  }

  .switch input:checked + .slider { background: #16a34a; }
  .switch input:checked + .slider::before { transform: translateX(20px); }

  /* cached domains */
  .section {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid #e5e5e5;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }

  .section-header h2 {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #999;
  }

  .clear-btn {
    font-size: 11px;
    color: #999;
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px 0;
  }

  .clear-btn:hover { color: #cc0000; }

  .domain-list {
    list-style: none;
    max-height: 160px;
    overflow-y: auto;
  }

  .domain-list li {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    padding: 4px 0;
    color: #333;
  }

  .domain-list li + li { border-top: 1px solid #f0f0f0; }

  .remove-btn {
    font-size: 16px;
    line-height: 1;
    color: #ccc;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0 2px;
  }

  .remove-btn:hover { color: #cc0000; }

  .empty {
    font-size: 12px;
    color: #bbb;
    font-style: italic;
    padding: 4px 0;
  }

  .footer {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid #e5e5e5;
    font-size: 11px;
    color: #999;
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .footer a {
    color: #999;
    text-decoration: none;
  }

  .footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
  <div class="header">
    <img src="icons/icon-48.png" alt="">
    <h1>Kill Yr Substack</h1>
  </div>

  <div class="toggle-row">
    <span id="status" class="status">Checking&hellip;</span>
    <label class="switch">
      <input type="checkbox" id="toggle">
      <span class="slider"></span>
    </label>
  </div>

  <div class="section" id="domains-section" hidden>
    <div class="section-header">
      <h2>Learned domains</h2>
      <button id="clear-all" class="clear-btn">Clear all</button>
    </div>
    <ul id="domain-list" class="domain-list"></ul>
  </div>

  <div class="footer">
    <a href="#" id="settings-link">Settings</a>
    <a href="https://github.com/anticapitalistcomputerclub/kill-yr-substack" target="_blank" rel="noopener">anticapitalistcomputerclub/kill-yr-substack</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
